<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Flip Menu</title>
<link rel="stylesheet" href="style.css">

<style>
body{text-align:center}

.flip-card{
  width:180px;
  height:180px;
  margin:120px auto 40px;
  perspective:1000px;
  cursor:pointer;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:.7s;
}

.flip-card.active .flip-inner{transform:rotateY(180deg)}

.flip-front,.flip-back{
  position:absolute;
  inset:0;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
}

.flip-front{
  background:linear-gradient(135deg,#00f2ff,#00aaff);
  color:#000;
  font-size:24px;
  font-weight:bold;
}

.flip-back{
  background:rgba(0,0,0,.75);
  transform:rotateY(180deg);
  flex-direction:column;
  gap:12px;
}

.flip-back a{
  color:#00eaff;
  text-decoration:none;
  font-weight:bold;
}

button{
  padding:10px 22px;
  border:none;
  background:#00eaff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="page-container">
  <h1>3D Flip Menu 🔄</h1>

  <div class="flip-card" id="flipCard" onclick="flipMenu()">
    <div class="flip-inner">
      <div class="flip-front">Menu</div>
      <div class="flip-back">
        <a href="home.html" onclick="event.stopPropagation()">Home</a>
        <a href="features.html" onclick="event.stopPropagation()">Features</a>
        <a href="contact.html" onclick="event.stopPropagation()">Contact</a>
      </div>
    </div>
  </div>

  <button onclick="history.back()">⬅ Back</button>
</div>

<script>
function flipMenu(){
  flipCard.classList.toggle("active");
}
</script>

</body>
</html>
