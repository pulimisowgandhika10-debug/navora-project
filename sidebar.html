<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sidebar Navigation</title>
<link rel="stylesheet" href="style.css">

<style>
body{text-align:center}

/* Sidebar */
.side-nav{
  position:fixed;
  top:50%;
  left:20px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:15px;
}

.side-nav a{
  width:160px;
  padding:14px;
  text-decoration:none;
  color:white;
  background:rgba(0,0,0,.6);
  border-radius:12px;
  transition:.3s;
}

.side-nav a:hover{
  background:linear-gradient(90deg,#00eaff,#0077ff);
  box-shadow:0 0 15px #00eaff;
}

button{
  margin-top:420px;
  padding:10px 20px;
  border:none;
  background:#00eaff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1 style="margin-top:50px;">Sidebar Navigation 📂</h1>

<div class="side-nav">
  <a href="home.html">🏠 Home</a>
  <a href="features.html">⭐ Features</a>
  <a href="contact.html">📞 Contact</a>
</div>

<button onclick="history.back()">⬅ Back</button>

</body>
</html>
