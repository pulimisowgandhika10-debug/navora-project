<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expand Menu</title>

<link rel="stylesheet" href="style.css">

<style>
body{text-align:center}

/* Menu */
.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:80px;
}

.item{
  width:80px;
  height:80px;
  background:#00eaff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  transition:.4s;
}

/* Expand */
.item.active{
  width:150px;
  border-radius:20px;
}

/* Text */
.item span{
  display:none;
  color:black;
  font-weight:bold;
}

.item.active span{
  display:inline;
}

button{
  margin-top:40px;
  padding:10px 20px;
  border:none;
  background:#00eaff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Expand Menu ⬜➡</h1>

<div class="menu">
  <a href="home.html" class="item" onclick="handleClick(event,this)">
    <span>Home</span>
  </a>

  <a href="features.html" class="item" onclick="handleClick(event,this)">
    <span>Features</span>
  </a>

  <a href="contact.html" class="item" onclick="handleClick(event,this)">
    <span>Contact</span>
  </a>
</div>

<button onclick="history.back()">⬅ Back</button>

<script>
function handleClick(e, el){
  // If not expanded → expand only
  if(!el.classList.contains("active")){
    e.preventDefault();        // stop navigation
    el.classList.add("active");
  }
  // If already expanded → allow navigation
}
</script>

</body>
</html>
