<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Animation</title>
<link rel="stylesheet" href="style.css">

<style>
body{text-align:center}

.neon-box{
  width:120px;
  height:120px;
  margin:60px auto 30px;
  border-radius:12px;
  background:#00eaff;
  color:#00eaff;
  box-shadow:0 0 20px currentColor;
  animation:glow 2s infinite;
}

@keyframes glow{
  50%{transform:scale(1.1);box-shadow:0 0 35px currentColor}
}

.neon-nav{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:25px 0;
  flex-wrap:wrap;
}

.neon-nav a{
  padding:10px 20px;
  border:2px solid #00eaff;
  border-radius:12px;
  color:#00eaff;
  text-decoration:none;
  box-shadow:0 0 10px #00eaff;
}

button{
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.back-btn{background:#00eaff}
</style>
</head>
<body>

<div class="page-container">
  <h1>Neon Animation ⚡</h1>

  <div id="box" class="neon-box"></div>

  <div class="neon-nav">
    <a href="home.html" class="nav-btn">Home</a>
    <a href="features.html" class="nav-btn">Features</a>
    <a href="contact.html" class="nav-btn">Contact</a>
  </div>

  <button onclick="changeColor('#00eaff')">Blue</button>
  <button onclick="changeColor('red')">Red</button>
  <button onclick="changeColor('lime')">Green</button>
  <button onclick="changeColor('orange')">Orange</button>

  <br><br>
  <button class="back-btn" onclick="history.back()">⬅ Back</button>
</div>

<script>
function changeColor(c){
  box.style.background=c;
  box.style.color=c;
  document.querySelectorAll(".nav-btn").forEach(a=>{
    a.style.color=c;
    a.style.borderColor=c;
    a.style.boxShadow=`0 0 10px ${c}`;
  });
}
</script>

</body>
</html>
